<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Secretaria">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>Secretaria IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #252530;
  --accent: #7c6bff;
  --accent2: #b8aeff;
  --accent-glow: rgba(124,107,255,0.15);
  --text: #f0eff8;
  --text-dim: #6b6a7a;
  --text-mid: #a09fbb;
  --red: #ff6b6b;
  --amber: #ffb347;
  --green: #6bffa8;
  --safe: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Epilogue', sans-serif;
  font-weight: 400;
}

/* ──────────────── SCREENS ──────────────── */
.screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
.screen.active { display: flex; }

/* ──────────────── SETUP SCREEN ──────────────── */
#setup {
  background: radial-gradient(ellipse at 50% 0%, rgba(124,107,255,0.18) 0%, transparent 65%), var(--bg);
  justify-content: center;
  padding: 2rem 1.5rem;
  overflow-y: auto;
}

.setup-logo {
  text-align: center;
  margin-bottom: 2.5rem;
}

.setup-logo .orb {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #7c6bff, #b8aeff);
  border-radius: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin-bottom: 1rem;
  box-shadow: 0 0 40px rgba(124,107,255,0.4);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 40px rgba(124,107,255,0.4); }
  50% { box-shadow: 0 0 60px rgba(124,107,255,0.7); }
}

.setup-logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.9rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fff 30%, #b8aeff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.setup-logo p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.4rem;
}

.field {
  margin-bottom: 1.25rem;
}

.field label {
  display: block;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.field input, .field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.85rem 1rem;
  font-family: 'Epilogue', sans-serif;
  font-size: 0.9rem;
  border-radius: 12px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.hint {
  background: var(--surface2);
  border-left: 2px solid var(--accent);
  padding: 0.75rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.78rem;
  color: var(--text-mid);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.hint a { color: var(--accent2); text-decoration: none; }
.hint code { font-size: 0.7rem; background: var(--border); padding: 0.1rem 0.35rem; border-radius: 4px; }

.btn-main {
  width: 100%;
  background: linear-gradient(135deg, #7c6bff, #9b8eff);
  color: #fff;
  border: none;
  padding: 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(124,107,255,0.4);
}

.btn-main:active { transform: scale(0.98); opacity: 0.9; }

.btn-ghost {
  width: 100%;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 0.85rem;
  font-family: 'Epilogue', sans-serif;
  font-size: 0.85rem;
  border-radius: 14px;
  cursor: pointer;
  margin-top: 0.75rem;
  transition: border-color 0.2s, color 0.2s;
}

.btn-ghost:active { border-color: var(--accent); color: var(--accent2); }

/* ──────────────── MAIN APP ──────────────── */
#app {
  background: radial-gradient(ellipse at 50% -20%, rgba(124,107,255,0.1) 0%, transparent 50%), var(--bg);
}

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  padding-top: calc(1rem + env(safe-area-inset-top, 0px));
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-left h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
}

.topbar-left span {
  font-size: 0.72rem;
  color: var(--text-dim);
  display: block;
  margin-top: 1px;
}

.topbar-right { display: flex; gap: 0.5rem; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
}

.icon-btn:active { background: var(--accent-glow); color: var(--accent2); }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.25rem;
  padding-bottom: calc(5rem + env(safe-area-inset-bottom, 0px));
  -webkit-overflow-scrolling: touch;
}

/* GREETING CARD */
.greeting-card {
  background: linear-gradient(135deg, rgba(124,107,255,0.2), rgba(184,174,255,0.08));
  border: 1px solid rgba(124,107,255,0.25);
  border-radius: 18px;
  padding: 1.25rem;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.greeting-orb {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #7c6bff, #b8aeff);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem;
  flex-shrink: 0;
}

.greeting-card h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 0.2rem;
}

.greeting-card p {
  font-size: 0.78rem;
  color: var(--text-mid);
  line-height: 1.4;
}

/* SECTION */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
}

.badge-count {
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.15rem 0.5rem;
  border-radius: 20px;
  font-family: 'Syne', sans-serif;
}

/* TASK CARD */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1rem;
  margin-bottom: 0.75rem;
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.task-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

.task-card.urgent::before { background: var(--red); }
.task-card.normal::before { background: var(--accent); }
.task-card.low::before { background: var(--green); }

.task-card.done {
  opacity: 0.38;
}

.task-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
  margin-bottom: 0.4rem;
}

.task-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  line-height: 1.3;
  flex: 1;
}

.task-card.done .task-title { text-decoration: line-through; }

.prio-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}

.prio-dot.urgent { background: var(--red); box-shadow: 0 0 6px var(--red); }
.prio-dot.normal { background: var(--accent); }
.prio-dot.low { background: var(--green); }

.task-from {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}

.task-summary {
  font-size: 0.8rem;
  color: var(--text-mid);
  line-height: 1.5;
  margin-bottom: 0.75rem;
}

.task-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.prio-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.prio-label.urgent { color: var(--red); }
.prio-label.normal { color: var(--accent2); }
.prio-label.low { color: var(--green); }

.task-actions { display: flex; gap: 0.4rem; }

.chip-btn {
  font-size: 0.72rem;
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-mid);
  cursor: pointer;
  font-family: 'Epilogue', sans-serif;
  transition: all 0.15s;
}

.chip-btn:active { border-color: var(--accent); color: var(--accent2); }
.chip-btn.done-chip:active { border-color: var(--green); color: var(--green); }

/* SUMMARY CARD */
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1rem;
  margin-bottom: 1.25rem;
  font-size: 0.82rem;
  color: var(--text-mid);
  line-height: 1.6;
}

/* LOADING STATE */
.loading-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem 1rem;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.82rem;
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 0.75rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(13,13,20,0.92);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 0.6rem 1rem;
  padding-bottom: calc(0.6rem + env(safe-area-inset-bottom, 0px));
  gap: 0.5rem;
  justify-content: space-around;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
  padding: 0.5rem;
  border-radius: 12px;
  cursor: pointer;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Epilogue', sans-serif;
  font-size: 0.62rem;
  transition: all 0.15s;
}

.nav-btn .icon { font-size: 1.2rem; }
.nav-btn.active { color: var(--accent2); background: var(--accent-glow); }

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: flex-end;
}

.modal-bg.open { display: flex; }

.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  width: 100%;
  max-height: 75vh;
  overflow-y: auto;
  padding: 1.5rem;
  padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 1.25rem;
}

.modal-sheet h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
}

.modal-meta { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 1rem; }

.modal-body {
  font-size: 0.82rem;
  color: var(--text-mid);
  line-height: 1.7;
  white-space: pre-wrap;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
}

/* TOAST */
.toast {
  position: fixed;
  top: calc(1rem + env(safe-area-inset-top, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--surface2);
  border: 1px solid var(--accent);
  color: var(--accent2);
  padding: 0.6rem 1.25rem;
  border-radius: 20px;
  font-size: 0.8rem;
  z-index: 300;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* EMPTY */
.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text-dim);
  font-size: 0.82rem;
}

.empty-state .big { font-size: 2.5rem; margin-bottom: 0.75rem; }

/* Animations for cards */
.task-card { animation: fadeSlide 0.3s ease both; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-card:nth-child(1) { animation-delay: 0.05s; }
.task-card:nth-child(2) { animation-delay: 0.1s; }
.task-card:nth-child(3) { animation-delay: 0.15s; }
.task-card:nth-child(4) { animation-delay: 0.2s; }
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup" class="screen active">
  <div class="setup-logo">
    <div class="orb">🤖</div>
    <h1>Secretaria IA</h1>
    <p>Tu asistente personal inteligente</p>
  </div>

  <div class="hint">
    <strong>Necesitas 2 claves:</strong><br>
    1. <strong>Anthropic:</strong> <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys → Create Key<br>
    2. <strong>Google Client ID:</strong> <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a> → Credenciales → OAuth 2.0<br>
    URI de redirección: <code id="redirect-uri"></code>
  </div>

  <div class="field">
    <label>🔑 Anthropic API Key</label>
    <input type="password" id="anthropic-key" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" autocapitalize="off">
  </div>

  <div class="field">
    <label>Google Client ID</label>
    <input type="text" id="client-id" placeholder="xxxxx.apps.googleusercontent.com" autocomplete="off" autocorrect="off" autocapitalize="off">
  </div>

  <div class="field">
    <label>Correos a analizar</label>
    <select id="email-count">
      <option value="20">Últimos 20</option>
      <option value="50">Últimos 50</option>
      <option value="10">Últimos 10</option>
    </select>
  </div>

  <button class="btn-main" onclick="startGoogleAuth()">Conectar con Google Workspace</button>
  <button class="btn-ghost" onclick="loadDemo()">Ver demo</button>
</div>

<!-- ── MAIN APP SCREEN ── -->
<div id="app" class="screen">

  <div class="topbar">
    <div class="topbar-left">
      <h2>Secretaria IA</h2>
      <span id="account-email">—</span>
    </div>
    <div class="topbar-right">
      <div class="icon-btn" onclick="triggerAnalysis()" title="Actualizar">↻</div>
      <div class="icon-btn" onclick="logout()" title="Salir">⏻</div>
    </div>
  </div>

  <div class="scroll-area" id="scroll-area">
    <!-- Content injected by JS -->
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-tasks" onclick="switchTab('tasks')">
      <span class="icon">✅</span>Tareas
    </button>
    <button class="nav-btn" id="nav-emails" onclick="switchTab('emails')">
      <span class="icon">📬</span>Correos
    </button>
    <button class="nav-btn" id="nav-more" onclick="switchTab('more')">
      <span class="icon">＋</span>Próximamente
    </button>
  </nav>
</div>

<!-- EMAIL DETAIL MODAL -->
<div class="modal-bg" id="email-modal" onclick="closeModal()">
  <div class="modal-sheet" onclick="e => e.stopPropagation()">
    <div class="modal-handle"></div>
    <h3 id="modal-subject">—</h3>
    <div class="modal-meta" id="modal-meta">—</div>
    <div class="modal-body" id="modal-body">—</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let accessToken = null;
let emails = [];
let tasks = [];
let currentTab = 'tasks';
const redirectUri = location.href.split('?')[0].split('#')[0];
document.getElementById('redirect-uri').textContent = redirectUri;

// ── INIT ──
window.addEventListener('load', () => {
  const cfg = JSON.parse(localStorage.getItem('sec_cfg') || '{}');
  if (cfg.clientId) document.getElementById('client-id').value = cfg.clientId;
  if (cfg.emailCount) document.getElementById('email-count').value = cfg.emailCount;
  if (cfg.anthropicKey) document.getElementById('anthropic-key').value = cfg.anthropicKey;

  const hash = location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.substring(1));
    accessToken = p.get('access_token');
    history.replaceState({}, '', location.pathname);
    if (accessToken) { showApp(); triggerAnalysis(); }
  }
});

// ── AUTH ──
function startGoogleAuth() {
  const clientId = document.getElementById('client-id').value.trim();
  const anthropicKey = document.getElementById('anthropic-key').value.trim();
  if (!anthropicKey) { showToast('Introduce tu Anthropic API Key'); return; }
  if (!clientId) { showToast('Introduce tu Client ID de Google'); return; }
  localStorage.setItem('sec_cfg', JSON.stringify({
    clientId,
    emailCount: document.getElementById('email-count').value,
    anthropicKey
  }));
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent('https://www.googleapis.com/auth/gmail.readonly')}`;
  location.href = url;
}

function logout() {
  accessToken = null;
  emails = []; tasks = [];
  document.getElementById('setup').classList.add('active');
  document.getElementById('app').classList.remove('active');
}

function showApp() {
  document.getElementById('setup').classList.remove('active');
  document.getElementById('app').classList.add('active');
}

// ── GMAIL FETCH ──
async function fetchGmail() {
  const count = JSON.parse(localStorage.getItem('sec_cfg') || '{}').emailCount || 20;
  const [listRes, profileRes] = await Promise.all([
    fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=${count}`, { headers: { Authorization: `Bearer ${accessToken}` } }),
    fetch('https://gmail.googleapis.com/gmail/v1/users/me/profile', { headers: { Authorization: `Bearer ${accessToken}` } })
  ]);
  const [listData, profile] = await Promise.all([listRes.json(), profileRes.json()]);
  document.getElementById('account-email').textContent = profile.emailAddress || '';
  if (!listData.messages) return [];

  const fetched = await Promise.all(
    listData.messages.map(m =>
      fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=full`, { headers: { Authorization: `Bearer ${accessToken}` } }).then(r => r.json())
    )
  );

  return fetched.map(msg => {
    const h = msg.payload?.headers || [];
    const get = n => h.find(x => x.name.toLowerCase() === n.toLowerCase())?.value || '';
    let body = '';
    const walk = parts => { if (!parts) return; for (const p of parts) { if (p.mimeType === 'text/plain' && p.body?.data) body += atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/')); if (p.parts) walk(p.parts); } };
    if (msg.payload?.body?.data) body = atob(msg.payload.body.data.replace(/-/g,'+').replace(/_/g,'/'));
    walk(msg.payload?.parts);
    return {
      id: msg.id,
      subject: get('Subject') || '(sin asunto)',
      from: get('From'),
      date: get('Date'),
      snippet: msg.snippet || '',
      body: body.substring(0, 2000),
      unread: msg.labelIds?.includes('UNREAD')
    };
  });
}

// ── CLAUDE ANALYSIS ──
async function analyzeWithClaude(emailsData) {
  const txt = emailsData.map((e,i) =>
    `[${i}] De: ${e.from}\nFecha: ${e.date}\nAsunto: ${e.subject}\nContenido: ${(e.body || e.snippet).substring(0,800)}`
  ).join('\n\n');

  const apiKey = JSON.parse(localStorage.getItem('sec_cfg') || '{}').anthropicKey || '';
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `Eres una secretaria ejecutiva. Analiza estos correos y extrae todas las acciones pendientes que requieren respuesta o acción del usuario.

Responde SOLO JSON válido, sin texto extra:
{
  "tasks": [
    {
      "title": "Acción concreta y corta",
      "from": "nombre del remitente",
      "summary": "qué exactamente piden, en 1 frase",
      "priority": "urgent|normal|low",
      "email_index": 0
    }
  ],
  "summary": "Resumen del buzón en 1-2 frases"
}

Correos:
${txt}`
      }]
    })
  });

  const data = await res.json();
  const text = (data.content?.[0]?.text || '{}').replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

// ── TRIGGER ANALYSIS ──
async function triggerAnalysis() {
  renderLoading();
  try {
    console.log('[Secretaria] accessToken:', accessToken ? 'presente' : 'AUSENTE');
    if (accessToken) {
      console.log('[Secretaria] Obteniendo correos de Gmail...');
      emails = await fetchGmail();
      console.log('[Secretaria] Correos obtenidos:', emails.length);
    } else {
      console.warn('[Secretaria] Sin accessToken, no se pueden obtener correos');
    }
    const apiKey = JSON.parse(localStorage.getItem('sec_cfg') || '{}').anthropicKey || '';
    console.log('[Secretaria] API Key presente:', apiKey ? 'sí' : 'NO');
    console.log('[Secretaria] Correos a analizar:', emails.length);
    const analysis = await analyzeWithClaude(emails);
    console.log('[Secretaria] Tareas encontradas:', analysis.tasks?.length || 0);
    tasks = (analysis.tasks || []).map(t => ({ ...t, done: false }));
    window._summary = analysis.summary || '';
    renderCurrentTab();
    showToast('✓ Actualizado');
  } catch(e) {
    console.error('[Secretaria] Error:', e);
    renderError(e.message);
  }
}

// ── RENDER ──
function renderLoading() {
  document.getElementById('scroll-area').innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      Analizando correos con IA...
    </div>`;
}

function renderError(msg) {
  document.getElementById('scroll-area').innerHTML = `
    <div class="empty-state"><div class="big">⚠️</div>${msg}</div>`;
}

function renderCurrentTab() {
  if (currentTab === 'tasks') renderTasks();
  else if (currentTab === 'emails') renderEmails();
  else renderMore();
}

function renderTasks() {
  const pending = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  document.getElementById('nav-tasks').querySelector('.icon').textContent = pending.length > 0 ? '🔴' : '✅';

  let html = '';

  // Greeting
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
  html += `
    <div class="greeting-card">
      <div class="greeting-orb">🤖</div>
      <div>
        <h3>${greet}</h3>
        <p>${pending.length === 0 ? '¡Todo al día! Sin tareas pendientes.' : `Tienes <strong>${pending.length} tarea${pending.length>1?'s':''}</strong> pendiente${pending.length>1?'s':''}${tasks.filter(t=>t.priority==='urgent'&&!t.done).length>0?' · '+tasks.filter(t=>t.priority==='urgent'&&!t.done).length+' urgente(s)':''}.`}</p>
      </div>
    </div>`;

  if (window._summary) {
    html += `<div class="summary-card">${window._summary}</div>`;
  }

  if (!tasks.length) {
    html += `<div class="empty-state"><div class="big">📭</div>Sin tareas. Pulsa ↻ para analizar correos.</div>`;
  } else {
    // Pending tasks
    if (pending.length) {
      html += `<div class="section-header"><span class="section-title">Pendientes</span><span class="badge-count">${pending.length}</span></div>`;
      html += tasks.map((t,i) => t.done ? '' : taskCard(t,i)).join('');
    }

    // Done tasks
    if (done.length) {
      html += `<div class="section-header" style="margin-top:1.25rem"><span class="section-title">Completadas</span></div>`;
      html += tasks.map((t,i) => !t.done ? '' : taskCard(t,i)).join('');
    }
  }

  document.getElementById('scroll-area').innerHTML = html;
}

function taskCard(t, i) {
  return `
  <div class="task-card ${t.priority} ${t.done ? 'done' : ''}">
    <div class="task-top">
      <div class="task-title">${t.title}</div>
      <div class="prio-dot ${t.priority}"></div>
    </div>
    <div class="task-from">📧 ${t.from}</div>
    <div class="task-summary">${t.summary}</div>
    <div class="task-footer">
      <span class="prio-label ${t.priority}">${t.priority === 'urgent' ? '🔴 Urgente' : t.priority === 'normal' ? '🔵 Normal' : '🟢 Bajo'}</span>
      <div class="task-actions">
        ${t.email_index !== undefined && emails[t.email_index] ? `<button class="chip-btn" onclick="openEmail(${t.email_index})">Ver correo</button>` : ''}
        <button class="chip-btn done-chip" onclick="toggleDone(${i})">${t.done ? '↩ Reabrir' : '✓ Hecho'}</button>
      </div>
    </div>
  </div>`;
}

function renderEmails() {
  if (!emails.length) {
    document.getElementById('scroll-area').innerHTML = `<div class="empty-state"><div class="big">📬</div>Sin correos cargados.</div>`;
    return;
  }
  let html = `<div class="section-header"><span class="section-title">Correos recientes</span></div>`;
  html += emails.map((e,i) => `
    <div class="task-card normal" style="padding:0.85rem" onclick="openEmail(${i})">
      <div class="task-top">
        <div class="task-title" style="font-size:0.82rem">${e.subject}</div>
        <div class="prio-dot ${e.unread ? 'urgent' : 'low'}"></div>
      </div>
      <div class="task-from">${e.from.replace(/<.*>/,'').trim()}</div>
      <div class="task-summary">${e.snippet.substring(0,100)}…</div>
    </div>`).join('');
  document.getElementById('scroll-area').innerHTML = html;
}

function renderMore() {
  document.getElementById('scroll-area').innerHTML = `
    <div style="padding:2rem 0">
      <div class="greeting-card" style="flex-direction:column;text-align:center;gap:0.75rem">
        <div class="greeting-orb" style="width:56px;height:56px;font-size:1.75rem">🚧</div>
        <div>
          <h3 style="margin-bottom:0.4rem">Próximas funciones</h3>
          <p>Aquí irán apareciendo nuevas capacidades conforme las vayamos añadiendo.</p>
        </div>
      </div>
      <div style="margin-top:1rem">
        ${['📅 Recordatorios de calendario', '💬 Análisis de Slack / Teams', '📋 Gestión de tareas propias', '📊 Resumen semanal automático', '🔔 Notificaciones push'].map(f => `
        <div class="task-card low" style="opacity:0.6">
          <div class="task-title" style="font-size:0.85rem">${f}</div>
          <div class="task-from" style="margin-top:0.25rem">Próximamente</div>
        </div>`).join('')}
      </div>
    </div>`;
}

// ── INTERACTIONS ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${tab}`).classList.add('active');
  renderCurrentTab();
}

function toggleDone(i) {
  tasks[i].done = !tasks[i].done;
  showToast(tasks[i].done ? '✓ Tarea completada' : '↩ Reabierta');
  renderTasks();
}

function openEmail(i) {
  const e = emails[i];
  if (!e) return;
  document.getElementById('modal-subject').textContent = e.subject;
  document.getElementById('modal-meta').textContent = `De: ${e.from}  ·  ${fmtDate(e.date)}`;
  document.getElementById('modal-body').textContent = e.body || e.snippet || '(sin contenido)';
  document.getElementById('email-modal').classList.add('open');
}

function closeModal() { document.getElementById('email-modal').classList.remove('open'); }

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  const now = new Date();
  return dt.toDateString() === now.toDateString()
    ? dt.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' })
    : dt.toLocaleDateString('es', { day: 'numeric', month: 'short' });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
